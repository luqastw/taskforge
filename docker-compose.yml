services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskforge-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - PHP_IDE_CONFIG=serverName=Docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - taskforge

  nginx:
    image: nginx:alpine
    container_name: taskforge-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - taskforge

  mysql:
    image: mysql:8.0
    container_name: taskforge-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: taskforge
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: taskforge
      MYSQL_PASSWORD: taskforge
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskforge

  redis:
    image: redis:alpine
    container_name: taskforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - taskforge

  # Laravel Horizon para monitoramento de filas (será usado depois)
  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskforge-horizon
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan horizon
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - taskforge
    profiles:
      - production

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  taskforge:
    driver: bridge
